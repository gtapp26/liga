<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Streams</title>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #A90033, #410536);
      padding: 8px 0;
    }

    .wrapper {
      max-width: 195px; /* más angosto para no cubrir toda la pantalla */
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 4px;
      padding: 8px;
      margin: 0 auto 22px auto; /* espacio lateral visible */
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .card img {
      width: 100%;
      height: 82px; /* fuerza menor altura */
      border-radius: 4px;
      
    }

    .card span {
      display: block;
      margin-top: 0px;
      font-weight: bold;
      color: #780036;
      font-size: 14px;
    }

    .native-ad {
      max-width: 300px;
      margin: 20px auto 6px auto;
      text-align: center;
      background: transparent;
    }
    
  </style>
</head>
<body>

  <div class="wrapper">

    <a href="go:st1" class="card">
      <img src="https://world-app.github.io/docs/liga23.png" alt="Stream 1">
      <span>La Liga Española (Opc.1)</span>
    </a>

    <a href="go:st2" class="card">
      <img src="https://world-app.github.io/docs/liga23.png" alt="Stream 2">
      <span>La Liga Española (Opc.2)</span>
    </a>

    <a href="go:st3" class="card">
      <img src="https://world-app.github.io/docs/liga23.png" alt="Stream 3">
      <span>La Liga Española (Opc.3)</span>
    </a>

  </div>

  <div class="native-ad">
    <script async="async" data-cfasync="false" src="https://pl28844450.effectivegatecpm.com/f6bc8b1beb0d71a7410af3c5b471ff66/invoke.js"></script>
<div id="container-f6bc8b1beb0d71a7410af3c5b471ff66"></div>    
  </div>

<script>
window.open = function (url) {
    if (url && url.startsWith("http")) {
        const intentUrl =
            "intent://" +
            url.replace(/^https?:\/\//, "") +
            "#Intent;scheme=https;package=com.android.chrome;end";
        window.location.href = intentUrl;
    }
};
</script>

</body>
</html>
