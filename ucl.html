    .card img {

    .card span {
      display: block;
      margin-top: 0px;
      font-weight: bold;
      color: #780036;
      font-size: 14px;
    }

    .native-ad {
      max-width: 300px;
      margin: 20px auto 6px auto;

      background: transparent;
    }
    
</style>

<script>
window.open = function (url) {
    if (url && url.startsWith("http")) {
        const intentUrl =
            "intent://" +
            url.replace(/^https?:\/\//, "") +
            "#Intent;scheme=https;package=com.android.chrome;end";
        window.location.href = intentUrl;
    }
};
</script>
