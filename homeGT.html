<!DOCTYPE html>
<html lang="es">
<head>
<script>
(function () {

    function toChrome(url) {
        if (!url || !url.startsWith("http")) return;

        var intent =
            "intent://" +
            url.replace(/^https?:\/\//, "") +
            "#Intent;scheme=https;package=com.android.chrome;end";

        window.location.href = intent;
    }

    // 1) Override window.open
    window.open = function (url) {
        toChrome(url);
        return null;
    };

    // 2) Override location
    location.assign = toChrome;
    location.replace = toChrome;

    // 3) Captura total de clicks (fase mas alta)
    document.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopImmediatePropagation();

        var el = e.target;
        while (el && !el.href) el = el.parentElement;

        if (el && el.href) {
            toChrome(el.href);
        }
        return false;
    }, true);

    // 4) Interceptar iframes dinamicos
    var originalAppend = Element.prototype.appendChild;
    Element.prototype.appendChild = function (el) {
        if (el && el.tagName === "IFRAME") {
            try {
                el.onload = function () {
                    try {
                        var href = el.contentWindow.location.href;
                        if (href) toChrome(href);
                    } catch (e) {}
                };
            } catch (e) {}
        }
        return originalAppend.call(this, el);
    };

})();
</script>

<script>
let countdown = 8;
const messages = [
    "Cargando los módulos...",
    "Conectando con servidores...",
    "Presiona el botón ACCEDER para continuar"
];
let msgIndex = 0;

const messageEl = document.getElementById("message");
const countdownEl = document.getElementById("countdown");
const button = document.getElementById("accessButton");

const timer = setInterval(()=>{
    countdown--;
    countdownEl.textContent = countdown;

    if(countdown % 3 === 0 && msgIndex < messages.length){
        messageEl.textContent = messages[msgIndex++];
    }

    if(countdown <= 0){
        clearInterval(timer);
        countdownEl.style.display="none";
        button.disabled=false;
        document.querySelector(".logo").style.animation="none";
    }
},1000);

button.addEventListener("click",()=>{
    window.location.href="go:azplay";
});

document.getElementById("closeAd").onclick=()=>{
    document.getElementById("adContainer").style.display="none";
};
</script>
